pack:
  id: "nedoserver"
  name: "Nedoserver"
  version: "2.0.0"

versions:
  minecraft: "1.21.1"
  neoforge: "21.1.225"

builders:
  mrpack:
    include_files:
      - "./config/**"
      # - "./icon.png"
      # - src: "./helper/build/libs/*"
      #  dest: "mods/"

default_profile: "full"

profiles:
   server:
      groups:
         - optimizations
         - pretty
         - qol
   full:
     depends: "server"
     groups:
       - optimizations_client
       - qol_client
       - pretty_client
